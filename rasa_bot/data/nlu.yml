    - tôi muốn ăn [phở bò](dish_name)
    - cho tôi [2](quantity) phần [bò bít tết](dish_name)
    - gọi [1](quantity) ly [cà phê](dish_name)
    - tôi muốn thử [tiramisu](dish_name)

# Thêm vào đơn
- intent: add_to_order
  examples: |
    - thêm [cá hồi nướng](dish_name)
