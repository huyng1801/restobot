version: "3.1"

nlu:
# Chào hỏi
- intent: greet
  examples: |
    - xin chào
    - chào bạn
    - hello
    - hi
    - chào
    - xin chào nhà hàng
    - tôi muốn được hỗ trợ
    - bạn có thể giúp tôi không

# Tạm biệt
- intent: goodbye
  examples: |
    - tạm biệt
    - chào tạm biệt
    - bye
    - goodbye
    - hẹn gặp lại
    - cảm ơn bạn
    - tôi sẽ quay lại sau

# Đồng ý
- intent: affirm
  examples: |
    - có
    - đúng
    - được
    - ok
    - đồng ý
    - xác nhận
    - tôi đồng ý
    - chính xác
    - yes

# Từ chối
- intent: deny
  examples: |
    - không
    - không phải
    - sai rồi
    - không đúng
    - hủy bỏ
    - tôi không muốn
    - no

# Đặt bàn
- intent: book_table
  examples: |
    - tôi muốn đặt bàn
    - đặt bàn cho [2](number_of_people) người
    - tôi cần đặt chỗ cho [4](number_of_people) người
    - đặt bàn [hôm nay](date) lúc [7 giờ tối](time)
    - tôi muốn đặt bàn [ngày mai](date)
    - đặt chỗ cho [6](number_of_people) người vào [thứ 7](date)
    - tôi cần bàn [VIP](table_type)
    - đặt bàn [gần cửa sổ](location)
    - book table for [3](number_of_people) people
    - đặt bàn [tối nay](date) [19:30](time)
    - tôi muốn đặt bàn cho [gia đình](number_of_people)

# Hỏi bàn trống
- intent: ask_available_tables
  examples: |
    - có bàn trống không
    - bàn nào đang trống
    - còn chỗ không
    - có chỗ cho [4](number_of_people) người không
    - [tối nay](date) còn bàn không
    - kiểm tra bàn trống
    - xem bàn available

# Hủy đặt bàn
- intent: cancel_reservation
  examples: |
    - hủy đặt bàn
    - tôi muốn hủy reservation
    - cancel booking
    - không đặt nữa
    - hủy đặt chỗ
    - tôi không đến được

# Xem thực đơn
- intent: view_menu
  examples: |
    - xem thực đơn
    - cho tôi xem menu
