version: '3.8'

services:
  # React Frontend with hot reload
  frontend:
    build:
      context: ./restobot-frontend
      dockerfile: Dockerfile.dev
    container_name: restobot_frontend_dev
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_CHAT_API_URL: http://localhost:5005
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - "3000:3000"
    volumes:
      - ./restobot-frontend/src:/app/src
      - ./restobot-frontend/public:/app/public
    depends_on:
      - api
    networks:
      - restobot_network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: restobot_postgres_dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-restobot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restobot_network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restobot_api_dev
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-restobot_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DEBUG: ${DEBUG:-true}
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./rasa_bot:/app/rasa_bot
    networks:
      - restobot_network
    command: >
      sh -c "python migrate.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  # Rasa Bot
  rasa:
    build:
      context: .
      dockerfile: Dockerfile.rasa
    container_name: restobot_rasa_dev
    environment:
      PYTHONUNBUFFERED: 1
      PYDANTIC_V1: 1
    ports:
      - "5005:5005"
    volumes:
      - ./rasa_bot:/app/rasa_bot
      - ./app:/app/app
    networks:
      - restobot_network
    restart: unless-stopped
    working_dir: /app/rasa_bot

volumes:
  postgres_data:

networks:
  restobot_network:
    driver: bridge
