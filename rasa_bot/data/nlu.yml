# Hỏi giá món
- intent: ask_dish_price
  examples: |
    - [bò bít tết](dish_name) giá bao nhiêu
    - giá của [cá hồi nướng](dish_name)
    - [phở bò](dish_name) bao nhiêu tiền
    - món này giá bao nhiêu
    - giá cả như thế nào
    - [tiramisu](dish_name) có đắt không

# Hỏi chi tiết món
- intent: ask_dish_details
  examples: |
